<!DOCTYPE html>
<html>

<head>
    <title>Available Cars</title>

    <style>
        body {
            font-family: Arial;
            background: #1e293b;
            color: white;
            padding: 40px;
        }

        .car-card {
            background: #334155;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        .variants {
            display: none;
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <a href="/">⬅ Back</a>
    <h2>🚗 Available EV Cars</h2>

    <!-- DEBUG -->
    <p>Total Cars: {{ cars|length }}</p>

    {% for car in cars %}
    <div class="car-card" onclick="toggle({{ loop.index }})">
        <strong>{{ car.brand }} {{ car.model }}</strong>

        <div class="variants" id="v{{ loop.index }}">
            <select>
                {% for v in car.variants %}
                <option>{{ v }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    {% endfor %}

    <script>
        function toggle(id) {
            let el = document.getElementById("v" + id);
            el.style.display = el.style.display === "block" ? "none" : "block";
        }
    </script>

</body>

</html>
